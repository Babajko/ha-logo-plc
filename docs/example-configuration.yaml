# Example logo_plc configuration.
#
# Copy the `logo_plc:` block into configuration.yaml (or !include it) and
# restart HA. Each PLC becomes a device; each item becomes an entity.
#
# Every item has:
#   domain:  light | fan | switch | binary_sensor | button
#   control: impulse | latching | simple   (light / fan / switch only)
# and address fields:
#   state_address  - the Q coil to read    (Q1 = 8192, Q2 = 8193, ...)
#   pulse_address  - coil pulsed to toggle  (impulse control, and buttons)
#   write_address  - coil held at a level   (latching / simple control)
# Optional: pulse_duration, icon, device_class (switch / binary_sensor).

logo_plc:
  - name: LOGO1
    host: 192.168.0.2
    port: 504
    slave: 1
    scan_interval: 1
    outputs:
      # Room light on an impulse relay: reads Q1 (8192), pulses coil 21.
      - name: Living room
        domain: light
        control: impulse
        state_address: 8192
        pulse_address: 21
      - name: Kitchen
        domain: light
        control: impulse
        state_address: 8194
        pulse_address: 7
      # Exhaust fan on an impulse relay.
      - name: Bathroom fan
        domain: fan
        control: impulse
        state_address: 8198
        pulse_address: 11
      # Read-only indicators (no pulse coil in the program).
      - name: Q6
        domain: binary_sensor
        state_address: 8197
      - name: Q11
        domain: binary_sensor
        state_address: 8202
      # A plain impulse button.
      - name: Q20 pulse
        domain: button
        pulse_address: 10

  - name: LOGO2
    host: 192.168.0.3
    port: 504
    slave: 1
    scan_interval: 1
    outputs:
      - name: Hallway
        domain: light
        control: impulse
        state_address: 8192
        pulse_address: 19
